name: Feature request
description: Propose a production-budgeting improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: workflow
    attributes:
      label: Production workflow
      description: Describe the real workflow and who performs it.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is difficult or impossible today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the result, not only a proposed interface.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Synthetic example
      description: Use invented names, rates and amounts only.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and the roadmap.
          required: true
        - label: This request contains no confidential or personal data.
          required: true
